name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contributions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Refresh public contribution data
        run: python scripts/fetch_contributions.py --username Alexsandrrh

      - name: Render contribution calendar
        run: python scripts/render_contributions.py

      - name: Commit changed art
        shell: bash
        run: |
          git add data/contributions.json contrib-heatmap.svg
          if git diff --cached --quiet; then
            echo "Contribution art is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh contribution graph [skip ci]"
          git push

